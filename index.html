<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Opportunity Cost">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="Opportunity Cost">
<meta name="theme-color" content="#f2f2f7">
<link rel="icon" type="image/svg+xml" href="./icons/icon.svg">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<link rel="manifest" href="./manifest.webmanifest">

<title>Opportunity Cost</title>

<style>
:root {
    color-scheme: light dark;
    --bg: #f2f2f7;
    --card: #ffffff;
    --text: #000000;
    --secondary: #6e6e73;
    --accent: #007aff;
    --shadow: rgba(0,0,0,0.08);
}

@media (prefers-color-scheme: dark) {
    :root {
        --bg: #000000;
        --card: #1c1c1e;
        --text: #ffffff;
        --secondary: #98989d;
        --accent: #0a84ff;
        --shadow: rgba(255,255,255,0.05);
    }
}

* {
    box-sizing: border-box;
}

html {
    background: var(--bg);
    touch-action: manipulation;
}

body {
    touch-action: manipulation;
    margin: 0;
    padding:
        max(24px, env(safe-area-inset-top))
        20px
        max(24px, env(safe-area-inset-bottom))
        20px;
    background: var(--bg);
    color: var(--text);
    font-family:
        -apple-system,
        BlinkMacSystemFont,
        "SF Pro Display",
        sans-serif;
}

h1 {
    margin: 0 0 24px;
    font-size: 34px;
    font-weight: 700;
}

.card {
    background: var(--card);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: 0 4px 12px var(--shadow);
}

label {
    display: block;
    font-size: 14px;
    color: var(--secondary);
    margin-bottom: 8px;
}

input[type="number"] {
    width: 100%;
    border: none;
    border-radius: 14px;
    padding: 16px;
    font-size: 28px;
    background: var(--bg);
    color: var(--text);
}

input[type="number"]:focus,
input[type="search"]:focus,
input[type="text"]:focus {
    outline: 2px solid var(--accent);
}

input[type="search"],
input[type="text"] {
    width: 100%;
    border: none;
    border-radius: 14px;
    padding: 12px 16px;
    font-size: 16px;
    background: var(--bg);
    color: var(--text);
    -webkit-appearance: none;
    appearance: none;
}

.search-input {
    margin-bottom: 12px;
}

.settings-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}

.small-input {
    font-size: 18px !important;
}

.age-row {
    grid-column: 1 / -1;
    display: flex;
    gap: 12px;
    align-items: flex-end;
}

.age-input {
    flex: 1;
    min-width: 0;
}

.mode-toggle {
    flex: 1;
    min-width: 0;
}

.segmented-control {
    display: flex;
    background: var(--bg);
    border-radius: 14px;
    padding: 4px;
}

.segmented-control button {
    flex: 1;
    border: none;
    background: transparent;
    color: var(--secondary);
    padding: 12px 8px;
    font-size: 15px;
    border-radius: 10px;
    cursor: pointer;
}

.segmented-control button.active {
    background: var(--accent);
    color: white;
    font-weight: 600;
}

.quick-buttons {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    flex-wrap: wrap;
}

.quick-buttons button,
.primary-button {
    border: none;
    border-radius: 12px;
    padding: 12px 16px;
    background: var(--accent);
    color: white;
    font-size: 15px;
    cursor: pointer;
}

.result-table {
    display: grid;
    grid-template-columns: auto 1fr 1fr;
    column-gap: 12px;
    width: 100%;
    font-size: 18px;
}

.result-table.no-inflation {
    grid-template-columns: auto 1fr;
}

.result-row > :first-child {
    white-space: nowrap;
    padding-right: 4px;
}

.result-table.no-inflation .result-table-header > *,
.result-table.no-inflation .result-nominal {
    display: none;
}

.result-table-header,
.result-row {
    display: contents;
}

.result-table-header > * {
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(128,128,128,0.15);
    font-size: 13px;
    color: var(--secondary);
}

.result-row > * {
    padding: 10px 0;
}

.result-row:not(:last-child) > * {
    border-bottom: 1px solid rgba(128,128,128,0.15);
}

.result-col-value,
.result-nominal,
.result-real {
    text-align: right;
    font-variant-numeric: tabular-nums;
    justify-self: stretch;
}

.result-nominal {
    color: var(--secondary);
    font-weight: 400;
    opacity: 0.85;
}

.opportunity-cost {
    color: #ff3b30 !important;
}

.opportunity-cost-nominal {
    color: #ff3b30;
    opacity: 0.45;
}

.big-number .value-nominal.opportunity-cost-nominal {
    color: #ff3b30;
    opacity: 0.45;
}

.display-mode-control {
    margin-bottom: 16px;
}

.big-number {
    text-align: center;
}

.big-number .label {
    color: var(--secondary);
    font-size: 14px;
}

.big-number-values {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    column-gap: 20px;
    width: 100%;
    margin-top: 8px;
}

.big-number-values.stacked {
    grid-template-columns: 1fr;
    row-gap: 16px;
}

.big-number-values.stacked .big-number-divider {
    display: none;
}

.big-number-values.stacked .big-number-nominal,
.big-number-values.stacked .big-number-real {
    text-align: center;
    justify-self: center;
    padding: 0;
}

.big-number-values.no-inflation {
    grid-template-columns: 1fr;
}

.big-number-values.no-inflation .big-number-nominal,
.big-number-values.no-inflation .big-number-divider,
.big-number-values.no-inflation .big-number-real .label {
    display: none;
}

.big-number-values.no-inflation .big-number-real {
    text-align: center;
    justify-self: center;
    padding: 0;
}

.big-number-nominal {
    text-align: right;
    justify-self: stretch;
    padding-right: 4px;
    min-width: 0;
}

.big-number-real {
    text-align: left;
    justify-self: stretch;
    padding-left: 4px;
    min-width: 0;
}

.big-number-divider {
    justify-self: center;
    color: var(--secondary);
    font-size: 34px;
    font-weight: 300;
    line-height: 1;
    opacity: 0.45;
}

.big-number-nominal .label,
.big-number-real .label {
    margin-top: 8px;
}

.big-number .value-nominal {
    font-size: 42px;
    font-weight: 400;
    color: var(--secondary);
    opacity: 0.85;
    font-variant-numeric: tabular-nums;
    line-height: 1.1;
}

.big-number .value {
    font-size: 42px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    line-height: 1.1;
}

.log-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
}

.log-item:not(:last-child) {
    border-bottom: 1px solid rgba(128,128,128,0.15);
}

.log-content {
    flex: 1;
    min-width: 0;
}

.log-description {
    font-weight: 600;
}

.delete-button {
    border: none;
    background: none;
    color: #ff3b30;
    font-size: 15px;
    padding: 8px 4px;
    cursor: pointer;
    flex-shrink: 0;
}

.log-value {
    color: var(--secondary);
    margin-top: 4px;
}

.log-date {
    color: var(--secondary);
    font-size: 13px;
    margin-top: 4px;
}

.row {
    display: flex;
    gap: 8px;
}

.row input {
    flex: 1;
}

.empty {
    color: var(--secondary);
}

.chart-container {
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid rgba(128,128,128,0.15);
}

.growth-chart {
    width: 100%;
    height: auto;
    display: block;
}

.reset-button {
    width: 100%;
    border: none;
    border-radius: 12px;
    padding: 14px 16px;
    background: #ff3b30;
    color: white;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
}
</style>
</head>
<body>

<h1>Opportunity Cost Calculator</h1>

<div class="card">
    <label>Purchase Price ($)</label>
    <input id="amount" type="number" value="100" min="0" step="1">

    <div class="quick-buttons">
        <button onclick="addAmount(5)">+$5</button>
        <button onclick="addAmount(10)">+$10</button>
        <button onclick="addAmount(20)">+$20</button>
        <button onclick="addAmount(50)">+$50</button>
        <button onclick="addAmount(100)">+$100</button>
    </div>
</div>

<div class="card">
    <div class="settings-grid">
        <div>
            <label>Annual Return (%)</label>
            <input id="returnRate" class="small-input" type="number" value="9" step="0.1">
        </div>

        <div>
            <label>Inflation (%)</label>
            <input id="inflationRate" class="small-input" type="number" value="3">
        </div>

        <div class="age-row">
            <div class="age-input">
                <label>Current Age</label>
                <input id="currentAge" class="small-input" type="number" value="25">
            </div>

            <div class="mode-toggle">
                <label>Return Type</label>
                <div class="segmented-control">
                    <button id="modeInvest" type="button" class="active">
                        Invest
                    </button>
                    <button id="modeSave" type="button">
                        Save
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="card">
    <label>Display</label>
    <div class="segmented-control display-mode-control">
        <button id="modeOpportunityCost" type="button" class="active">
            Opportunity Cost
        </button>
        <button id="modeWorth" type="button">
            Worth
        </button>
    </div>

    <div class="big-number">
        <div id="retirementTitle" class="label">Opportunity Cost At Retirement (Age 65)</div>
        <div id="retirementValues" class="big-number-values">
            <div class="big-number-nominal">
                <div id="retirementNominalValue" class="value-nominal">$0</div>
                <div class="label">Nominal</div>
            </div>
            <span class="big-number-divider" aria-hidden="true">|</span>
            <div class="big-number-real">
                <div id="retirementValue" class="value">$0</div>
                <div id="afterInflationNote" class="label">After Inflation</div>
            </div>
        </div>
    </div>
</div>

<div class="card">
    <div id="resultTable" class="result-table">
        <div class="result-table-header">
            <span></span>
            <span class="result-col-value result-header-nominal">Nominal</span>
            <span class="result-col-value result-header-inflation">After Inflation</span>
        </div>

        <div class="result-row">
            <span>5 Years</span>
            <span id="y5nom" class="result-nominal"></span>
            <strong id="y5" class="result-real"></strong>
        </div>

        <div class="result-row">
            <span>10 Years</span>
            <span id="y10nom" class="result-nominal"></span>
            <strong id="y10" class="result-real"></strong>
        </div>

        <div class="result-row">
            <span>20 Years</span>
            <span id="y20nom" class="result-nominal"></span>
            <strong id="y20" class="result-real"></strong>
        </div>

        <div class="result-row">
            <span>30 Years</span>
            <span id="y30nom" class="result-nominal"></span>
            <strong id="y30" class="result-real"></strong>
        </div>

        <div class="result-row">
            <span>50 Years</span>
            <span id="y50nom" class="result-nominal"></span>
            <strong id="y50" class="result-real"></strong>
        </div>
    </div>

    <div class="chart-container">
        <svg
            id="growthChart"
            class="growth-chart"
            role="img"
            aria-label="Expected value over time"
        ></svg>
    </div>
</div>

<div class="card">
    <label>Purchase Description (Optional)</label>

    <div class="row">
        <input id="description" type="text" placeholder="Headphones">
        <button class="primary-button" onclick="savePurchase()">
            Save
        </button>
    </div>
</div>

<div class="card">
    <label>Avoided Purchases</label>
    <input
        id="logSearch"
        class="search-input"
        type="search"
        placeholder="Search by name or date"
        autocomplete="off"
        enterkeyhint="search"
    >
    <div id="purchaseLog" class="empty">
        No saved purchases.
    </div>
</div>

<button
    id="resetButton"
    class="reset-button"
    type="button"
    onclick="resetAppData()"
>
    Reset All Data
</button>

<script>
const RETIREMENT_AGE = 65;
const DEFAULT_CURRENT_AGE = 25;
const DEFAULT_INVEST_RETURN = 9;
const DEFAULT_SAVE_RETURN = 3.2;

let returnMode = 'invest';
let displayMode = 'opportunity';

function applyTheme() {
    const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;

    document.documentElement.style.colorScheme =
        dark ? 'dark' : 'light';

    document
        .querySelector('meta[name="theme-color"]')
        .setAttribute('content', dark ? '#000000' : '#f2f2f7');

    document
        .querySelector('meta[name="apple-mobile-web-app-status-bar-style"]')
        .setAttribute(
            'content',
            dark ? 'black-translucent' : 'default'
        );
}

applyTheme();

window
    .matchMedia('(prefers-color-scheme: dark)')
    .addEventListener('change', applyTheme);

function currency(v) {
    return new Intl.NumberFormat(
        'en-AU',
        {
            style: 'currency',
            currency: 'AUD',
            maximumFractionDigits: 0
        }
    ).format(v);
}

function futureValue(pv, rate, inflation, years) {
    const realRate = (1 + rate) / (1 + inflation) - 1;

    return pv * Math.pow(1 + realRate, years);
}

function futureValueNominal(pv, rate, years) {
    return pv * Math.pow(1 + rate, years);
}

function opportunityCostDisplay(amount, futureValue) {
    return amount - futureValue;
}

function formatProjectionValue(amount, futureValue) {
    if (displayMode === 'worth') {
        return {
            text: currency(futureValue),
            isOpportunityCost: false
        };
    }

    return {
        text: currency(opportunityCostDisplay(amount, futureValue)),
        isOpportunityCost: true
    };
}

function applyProjectionValue(element, amount, futureValue, isNominal = false) {
    const display = formatProjectionValue(amount, futureValue);

    element.textContent = display.text;
    element.classList.toggle(
        'opportunity-cost',
        display.isOpportunityCost && !isNominal
    );
    element.classList.toggle(
        'opportunity-cost-nominal',
        display.isOpportunityCost && isNominal
    );
}

function compactChartLabel(value) {
    if (value < 0) {
        return '-' + compactCurrency(-value);
    }

    return compactCurrency(value);
}

function compactCurrency(v) {
    if (v >= 1000000) {
        return '$' + (v / 1000000).toFixed(1) + 'M';
    }

    if (v >= 1000) {
        const thousands = Math.floor(v / 100) / 10;
        const label = Number.isInteger(thousands)
            ? String(thousands)
            : thousands.toFixed(1);

        return '$' + label + 'k';
    }

    return '$' + Math.round(v);
}

function getChartMilestones(yearsToRetirement) {
    const items = [
        { years: 5, label: '5y' },
        { years: 10, label: '10y' },
        { years: 20, label: '20y' },
        { years: 30, label: '30y' },
        { years: 50, label: '50y' },
        { years: yearsToRetirement, label: 'Ret.', highlight: true }
    ];
    const seen = new Set();

    return items.filter(item => {
        if (item.years <= 0 || seen.has(item.years)) {
            return false;
        }

        seen.add(item.years);
        return true;
    });
}

function projectionValue(amount, rate, inflation, years, nominal = false) {
    const future = nominal
        ? futureValueNominal(amount, rate, years)
        : futureValue(amount, rate, inflation, years);

    return displayMode === 'worth'
        ? future
        : opportunityCostDisplay(amount, future);
}

function filterOverlappingMilestones(
    milestones,
    amount,
    rate,
    inflation,
    y,
    minLabelGap = 14
) {
    const withPositions = milestones.map(milestone => {
        const value = projectionValue(
            amount,
            rate,
            inflation,
            milestone.years
        );

        return {
            ...milestone,
            value,
            cy: y(value)
        };
    });

    withPositions.sort((a, b) => b.value - a.value);

    const kept = [];

    for (const milestone of withPositions) {
        const overlaps = kept.some(
            keptMilestone =>
                Math.abs(keptMilestone.cy - milestone.cy) < minLabelGap
        );

        if (!overlaps) {
            kept.push(milestone);
        }
    }

    return kept;
}

function drawChart(amount, rate, inflation, yearsToRetirement) {
    const svg = document.getElementById('growthChart');
    const milestones = getChartMilestones(yearsToRetirement);
    const maxYears = Math.max(50, yearsToRetirement, 1);
    const isOpportunityCost = displayMode === 'opportunity';
    const chartAccent = isOpportunityCost ? '#ff3b30' : 'var(--accent)';
    const values = [];

    for (let year = 0; year <= maxYears; year++) {
        values.push(projectionValue(amount, rate, inflation, year));
    }

    let minValue;
    let maxValue;

    if (isOpportunityCost) {
        minValue = Math.min(...values, 0);
        maxValue = 0;
    } else {
        minValue = 0;
        maxValue = Math.max(...values, 1);
    }

    const width = 340;
    const height = 200;
    const pad = isOpportunityCost
        ? { top: 28, right: 12, bottom: 14, left: 48 }
        : { top: 14, right: 12, bottom: 30, left: 48 };
    const plotW = width - pad.left - pad.right;
    const plotH = height - pad.top - pad.bottom;
    const valueRange = maxValue - minValue || 1;

    const x = years => pad.left + (years / maxYears) * plotW;
    const y = value =>
        pad.top + plotH - ((value - minValue) / valueRange) * plotH;

    let linePath = '';

    for (let year = 0; year <= maxYears; year++) {
        const value = projectionValue(amount, rate, inflation, year);
        linePath += `${year === 0 ? 'M' : 'L'} ${x(year)} ${y(value)} `;
    }

    const baselineY = y(0);
    const milestoneLabelY = isOpportunityCost ? baselineY - 6 : height - 8;
    const areaPath = isOpportunityCost
        ? `${linePath} L ${x(maxYears)} ${baselineY} L ${x(0)} ${baselineY} Z`
        : `${linePath} L ${x(maxYears)} ${y(minValue)} L ${x(0)} ${y(minValue)} Z`;

    const visibleMilestones = filterOverlappingMilestones(
        milestones,
        amount,
        rate,
        inflation,
        y
    );

    const milestoneMarkup = visibleMilestones.map(milestone => {
        const value = milestone.value;
        const cx = x(milestone.years);
        const cy = milestone.cy;
        const color = isOpportunityCost
            ? '#ff3b30'
            : milestone.highlight
                ? 'var(--accent)'
                : 'var(--secondary)';
        const opacity = milestone.highlight ? '1' : '0.7';
        const strokeWidth = milestone.highlight ? '1.5' : '1';
        const fontWeight = milestone.highlight ? '600' : '400';

        return `
            <line
                x1="${cx}"
                y1="${baselineY}"
                x2="${cx}"
                y2="${cy}"
                stroke="${color}"
                stroke-width="${strokeWidth}"
                stroke-dasharray="4 4"
                opacity="${opacity}"
            />
            <line
                x1="${pad.left}"
                y1="${cy}"
                x2="${cx}"
                y2="${cy}"
                stroke="${color}"
                stroke-width="${strokeWidth}"
                stroke-dasharray="4 4"
                opacity="${opacity}"
            />
            <text
                x="${pad.left - 6}"
                y="${cy}"
                text-anchor="end"
                fill="${color}"
                font-size="10"
                font-weight="${fontWeight}"
                dominant-baseline="middle"
            >${compactChartLabel(value)}</text>
            <text
                x="${cx}"
                y="${milestoneLabelY}"
                text-anchor="middle"
                fill="${color}"
                font-size="10"
                font-weight="${fontWeight}"
            >${milestone.label}</text>
        `;
    }).join('');

    svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
    svg.innerHTML = `
        <line
            x1="${pad.left}"
            y1="${baselineY}"
            x2="${pad.left + plotW}"
            y2="${baselineY}"
            stroke="var(--secondary)"
            opacity="0.3"
        />
        <path
            d="${areaPath}"
            fill="${chartAccent}"
            opacity="0.12"
        />
        ${milestoneMarkup}
        <path
            d="${linePath}"
            fill="none"
            stroke="${chartAccent}"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
        />
    `;
}

function calculate() {
    const amount =
        parseFloat(document.getElementById('amount').value) || 0;

    const rate =
        (parseFloat(document.getElementById('returnRate').value) || 0) / 100;

    const inflation =
        (parseFloat(document.getElementById('inflationRate').value) || 0) / 100;

    const age =
        parseFloat(document.getElementById('currentAge').value) ||
        DEFAULT_CURRENT_AGE;

    [
        [5, 'y5'],
        [10, 'y10'],
        [20, 'y20'],
        [30, 'y30'],
        [50, 'y50']
    ].forEach(([years, id]) => {
        applyProjectionValue(
            document.getElementById(id + 'nom'),
            amount,
            futureValueNominal(amount, rate, years),
            true
        );

        applyProjectionValue(
            document.getElementById(id),
            amount,
            futureValue(amount, rate, inflation, years)
        );
    });

    const yearsToRetirement =
        Math.max(0, RETIREMENT_AGE - age);

    applyProjectionValue(
        document.getElementById('retirementNominalValue'),
        amount,
        futureValueNominal(amount, rate, yearsToRetirement),
        true
    );

    applyProjectionValue(
        document.getElementById('retirementValue'),
        amount,
        futureValue(amount, rate, inflation, yearsToRetirement)
    );

    updateDisplayModeUI();

    const inflationRate =
        parseFloat(document.getElementById('inflationRate').value) || 0;

    updateInflationUI(inflationRate);
    updateRetirementLayout();

    drawChart(amount, rate, inflation, yearsToRetirement);

    saveSettings();
}

function updateInflationUI(inflationRate) {
    const noInflation = inflationRate === 0;

    document
        .getElementById('resultTable')
        .classList.toggle('no-inflation', noInflation);

    document
        .getElementById('retirementValues')
        .classList.toggle('no-inflation', noInflation);
}

function updateRetirementLayout() {
    const container = document.getElementById('retirementValues');

    container.classList.remove('stacked');

    if (container.classList.contains('no-inflation')) {
        return;
    }

    requestAnimationFrame(() => {
        if (container.scrollWidth > container.clientWidth + 1) {
            container.classList.add('stacked');
        }
    });
}

function addAmount(value) {
    const input = document.getElementById('amount');
    input.value =
        (parseFloat(input.value) || 0) + value;

    calculate();

    if (navigator.vibrate) {
        navigator.vibrate(10);
    }
}

function readSettings() {
    const defaults = {
        returnMode: 'invest',
        displayMode: 'opportunity',
        investReturnRate: DEFAULT_INVEST_RETURN,
        saveReturnRate: DEFAULT_SAVE_RETURN,
        inflationRate: 3,
        currentAge: DEFAULT_CURRENT_AGE
    };
    const saved =
        localStorage.getItem('opportunityCostSettings');

    if (!saved) {
        return { ...defaults };
    }

    const parsed = JSON.parse(saved);

    return {
        ...defaults,
        ...parsed,
        investReturnRate:
            parsed.investReturnRate ??
            parsed.returnRate ??
            DEFAULT_INVEST_RETURN,
        saveReturnRate:
            parsed.saveReturnRate ?? DEFAULT_SAVE_RETURN
    };
}

function writeSettings(updates) {
    const settings = {
        ...readSettings(),
        ...updates
    };

    localStorage.setItem(
        'opportunityCostSettings',
        JSON.stringify(settings)
    );

    return settings;
}

function updateModeButtons() {
    document
        .getElementById('modeInvest')
        .classList.toggle('active', returnMode === 'invest');

    document
        .getElementById('modeSave')
        .classList.toggle('active', returnMode === 'save');
}

function updateDisplayModeUI() {
    document.getElementById('retirementTitle').textContent =
        displayMode === 'worth'
            ? 'Worth At Retirement (Age 65)'
            : 'Opportunity Cost At Retirement (Age 65)';

    document
        .getElementById('modeWorth')
        .classList.toggle('active', displayMode === 'worth');

    document
        .getElementById('modeOpportunityCost')
        .classList.toggle('active', displayMode === 'opportunity');
}

function setDisplayMode(mode) {
    displayMode = mode;

    writeSettings({ displayMode: mode });
    updateDisplayModeUI();
    calculate();
    renderLog();

    if (navigator.vibrate) {
        navigator.vibrate(10);
    }
}

function setReturnMode(mode) {
    const settings = readSettings();
    const currentReturn =
        document.getElementById('returnRate').value;

    writeSettings({
        returnMode: mode,
        investReturnRate:
            returnMode === 'invest'
                ? currentReturn
                : settings.investReturnRate,
        saveReturnRate:
            returnMode === 'save'
                ? currentReturn
                : settings.saveReturnRate
    });

    returnMode = mode;

    const updated = readSettings();

    document.getElementById('returnRate').value =
        mode === 'invest'
            ? updated.investReturnRate
            : updated.saveReturnRate;

    updateModeButtons();
    calculate();

    if (navigator.vibrate) {
        navigator.vibrate(10);
    }
}

function saveSettings() {
    const settings = readSettings();
    const currentReturn =
        document.getElementById('returnRate').value;

    writeSettings({
        returnMode,
        displayMode,
        investReturnRate:
            returnMode === 'invest'
                ? currentReturn
                : settings.investReturnRate,
        saveReturnRate:
            returnMode === 'save'
                ? currentReturn
                : settings.saveReturnRate,
        inflationRate:
            document.getElementById('inflationRate').value,
        currentAge:
            document.getElementById('currentAge').value
    });
}

function loadSettings() {
    const settings = readSettings();

    returnMode = settings.returnMode;
    displayMode = settings.displayMode;

    document.getElementById('returnRate').value =
        returnMode === 'invest'
            ? settings.investReturnRate
            : settings.saveReturnRate;

    document.getElementById('inflationRate').value =
        settings.inflationRate;

    document.getElementById('currentAge').value =
        settings.currentAge;

    updateModeButtons();
    updateDisplayModeUI();
}

function getLog() {
    return JSON.parse(
        localStorage.getItem('purchaseLog') || '[]'
    );
}

function savePurchase() {
    const amount =
        parseFloat(document.getElementById('amount').value);

    if (!amount) return;

    const description =
        document.getElementById('description').value.trim() ||
        'Unnamed Purchase';

    const rate =
        (parseFloat(document.getElementById('returnRate').value) || 0) / 100;

    const inflation =
        (parseFloat(document.getElementById('inflationRate').value) || 0) / 100;

    const age =
        parseFloat(document.getElementById('currentAge').value) ||
        DEFAULT_CURRENT_AGE;

    const retirementValue =
        futureValue(
            amount,
            rate,
            inflation,
            RETIREMENT_AGE - age
        );

    const log = getLog();

    log.unshift({
        id: crypto.randomUUID(),
        description,
        amount,
        retirementValue,
        date: new Date().toISOString()
    });

    localStorage.setItem(
        'purchaseLog',
        JSON.stringify(log)
    );

    document.getElementById('description').value = '';

    renderLog();
}

function itemId(item) {
    return item.id ?? item.date;
}

function formatLogDate(isoDate) {
    return new Intl.DateTimeFormat('en-AU', {
        day: 'numeric',
        month: 'short',
        year: 'numeric'
    }).format(new Date(isoDate));
}

function formatLogDateNumeric(isoDate) {
    const date = new Date(isoDate);
    const day = String(date.getDate()).padStart(2, '0');
    const month = String(date.getMonth() + 1).padStart(2, '0');

    return `${day}/${month}/${date.getFullYear()}`;
}

function matchesLogSearch(item, query) {
    if (item.description.toLowerCase().includes(query)) {
        return true;
    }

    if (!item.date) {
        return false;
    }

    const date = new Date(item.date);
    const searchable = [
        formatLogDate(item.date),
        formatLogDateNumeric(item.date),
        new Intl.DateTimeFormat('en-AU', {
            day: 'numeric',
            month: 'long',
            year: 'numeric'
        }).format(date),
        new Intl.DateTimeFormat('en-AU', {
            month: 'short'
        }).format(date),
        new Intl.DateTimeFormat('en-AU', {
            month: 'long'
        }).format(date),
        String(date.getFullYear()),
        String(date.getDate()).padStart(2, '0'),
        date.toISOString().slice(0, 10)
    ].join(' ').toLowerCase();

    return searchable.includes(query);
}

function resetAppData() {
    const confirmed = confirm(
        'This will permanently clear all saved data:\n\n' +
        '• Annual return settings (Invest and Save)\n' +
        '• Inflation rate\n' +
        '• All avoided purchases\n' +
        '• Current age\n\n' +
        'Are you sure?'
    );

    if (!confirmed) {
        return;
    }

    localStorage.removeItem('opportunityCostSettings');
    localStorage.removeItem('purchaseLog');

    returnMode = 'invest';
    displayMode = 'opportunity';
    document.getElementById('amount').value = 100;
    document.getElementById('description').value = '';
    document.getElementById('logSearch').value = '';

    loadSettings();
    calculate();
    renderLog();

    if (navigator.vibrate) {
        navigator.vibrate(10);
    }
}

function deletePurchase(id) {
    const log = getLog().filter(item => itemId(item) !== id);

    localStorage.setItem(
        'purchaseLog',
        JSON.stringify(log)
    );

    renderLog();

    if (navigator.vibrate) {
        navigator.vibrate(10);
    }
}

function renderLog() {
    const container =
        document.getElementById('purchaseLog');

    const query =
        document.getElementById('logSearch').value
            .trim()
            .toLowerCase();

    const allItems = getLog();
    const log = query
        ? allItems.filter(item => matchesLogSearch(item, query))
        : allItems;

    if (!allItems.length) {
        container.className = 'empty';
        container.textContent =
            'No saved purchases.';
        return;
    }

    if (!log.length) {
        container.className = 'empty';
        container.textContent =
            'No matching purchases.';
        return;
    }

    container.className = '';

    container.innerHTML =
        log.map(item => {
            const projection = formatProjectionValue(
                item.amount,
                item.retirementValue
            );

            return `
            <div class="log-item">
                <div class="log-content">
                    <div class="log-description">
                        ${item.description}
                    </div>
                    <div class="log-value">
                        ${currency(item.amount)}
                        →
                        <span class="${
                            projection.isOpportunityCost
                                ? 'opportunity-cost'
                                : ''
                        }">${projection.text}</span>
                        at retirement
                    </div>
                    <div class="log-date">
                        Added ${formatLogDate(item.date)}
                    </div>
                </div>
                <button
                    class="delete-button"
                    type="button"
                    data-delete-id="${itemId(item)}"
                    aria-label="Delete ${item.description}"
                >
                    Delete
                </button>
            </div>
        `;
        }).join('');
}

[
    'amount',
    'returnRate',
    'inflationRate',
    'currentAge'
].forEach(id => {
    document
        .getElementById(id)
        .addEventListener('input', calculate);
});

document
    .getElementById('modeInvest')
    .addEventListener('click', () => setReturnMode('invest'));

document
    .getElementById('modeSave')
    .addEventListener('click', () => setReturnMode('save'));

document
    .getElementById('modeWorth')
    .addEventListener('click', () => setDisplayMode('worth'));

document
    .getElementById('modeOpportunityCost')
    .addEventListener('click', () => setDisplayMode('opportunity'));

document
    .getElementById('logSearch')
    .addEventListener('input', renderLog);

document
    .getElementById('purchaseLog')
    .addEventListener('click', event => {
        const button = event.target.closest('[data-delete-id]');

        if (button) {
            deletePurchase(button.dataset.deleteId);
        }
    });

window.addEventListener('resize', updateRetirementLayout);

loadSettings();
calculate();
renderLog();

if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker
            .register('./sw.js')
            .catch(() => {});
    });
}
</script>

</body>
